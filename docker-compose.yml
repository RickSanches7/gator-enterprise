#
# LAUNCH:  docker compose up -d
# STOP:    docker compose down
# LOGS:    docker compose logs -f backend
# SHELL:   docker compose exec backend bash

services:

  # ─── PostgreSQL — encrypted scan database ───────────────────
  db:
    image: postgres:15-alpine
    container_name: gator_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gator_enterprise}
      POSTGRES_USER: ${POSTGRES_USER:-gator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-G@t0rS3cur3DB!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - gator_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"      # localhost only — не публичный
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gator} -d ${POSTGRES_DB:-gator_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gator_internal

  # ─── Redis — task queue + caching ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gator_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-G@t0rR3d1s!} --appendonly yes
    volumes:
      - gator_redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-G@t0rR3d1s!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gator_internal

  # ─── FastAPI Backend — main API server ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gator_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gator}:${POSTGRES_PASSWORD:-G@t0rS3cur3DB!}@db:5432/${POSTGRES_DB:-gator_enterprise}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-gator}:${POSTGRES_PASSWORD:-G@t0rS3cur3DB!}@db:5432/${POSTGRES_DB:-gator_enterprise}
      REDIS_URL: redis://:${REDIS_PASSWORD:-G@t0rR3d1s!}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-gator-enterprise-secret-key-change-in-production-2024}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      GATOR_VERSION: "2.0.0"
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - gator_reports:/app/reports/output
      # Docker socket — Windows: //./pipe/docker_engine, Linux/Mac: /var/run/docker.sock
      # Закомментировано по умолчанию — раскомментируй если нужна проверка Docker API
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gator_internal
      - gator_external
    # NET_ADMIN нужен для raw socket scanning (nmap)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true

  # ─── Celery Worker — async scan execution ───────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: gator_worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=10 -Q scans,reports,alerts
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gator}:${POSTGRES_PASSWORD:-G@t0rS3cur3DB!}@db:5432/${POSTGRES_DB:-gator_enterprise}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-gator}:${POSTGRES_PASSWORD:-G@t0rS3cur3DB!}@db:5432/${POSTGRES_DB:-gator_enterprise}
      REDIS_URL: redis://:${REDIS_PASSWORD:-G@t0rR3d1s!}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-gator-enterprise-secret-key-change-in-production-2024}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      GATOR_VERSION: "2.0.0"
    volumes:
      - ./backend:/app
      - gator_reports:/app/reports/output
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gator_internal
      - gator_external
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ─── Celery Beat — scheduled scans ──────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: gator_scheduler
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-gator}:${POSTGRES_PASSWORD:-G@t0rS3cur3DB!}@db:5432/${POSTGRES_DB:-gator_enterprise}
      REDIS_URL: redis://:${REDIS_PASSWORD:-G@t0rR3d1s!}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-gator-enterprise-secret-key-change-in-production-2024}
    volumes:
      - ./backend:/app
      - gator_celerybeat:/app/celerybeat
    depends_on:
      - redis
      - db
    networks:
      - gator_internal

  # ─── Flower — Celery monitoring UI ──────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: gator_flower
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-gator}:${FLOWER_PASSWORD:-gator123}
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-G@t0rR3d1s!}@redis:6379/0
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
    networks:
      - gator_internal

  # ─── Frontend — static HTML/JS served by nginx ──────────────
  frontend:
    image: nginx:alpine
    container_name: gator_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      - backend
    networks:
      - gator_external

networks:
  gator_internal:
    driver: bridge
    internal: true         # изолированная — нет доступа снаружи
  gator_external:
    driver: bridge

volumes:
  gator_pgdata:
    driver: local
  gator_redis:
    driver: local
  gator_reports:
    driver: local
  gator_celerybeat:
    driver: local
